spring:
  data:
    mongodb:
      uri: mongodb://localhost:27017/polyrepo-local

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://dev-example.okta.com/oauth2/default

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    enabled: true
    try-it-out-enabled: true

logging:
  level:
    com.polyrepo: DEBUG
    org.springframework.security: DEBUG
    org.springframework.data.mongodb: DEBUG

polyrepo:
  security:
    cors:
      allowed-origins:
        - http://localhost:3000
        - http://localhost:5173
